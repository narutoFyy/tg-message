server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: gift-chat-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      repositories:
        enabled: false

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5174,http://127.0.0.1:5174,http://localhost:5173,http://127.0.0.1:5173,https://*.cpolar.top,http://*.cpolar.top}
  auth:
    jwt-secret: ${APP_AUTH_JWT_SECRET:change-me-in-production}
    access-token-minutes: ${APP_AUTH_ACCESS_TOKEN_MINUTES:720}
    demo-fallback: ${APP_AUTH_DEMO_FALLBACK:true}
  upload:
    image-dir: ${APP_UPLOAD_IMAGE_DIR:uploads/images}
    voice-dir: ${APP_UPLOAD_VOICE_DIR:uploads/voices}
    public-base-url: ${APP_UPLOAD_PUBLIC_BASE_URL:}
  video:
    vendor: ${APP_VIDEO_VENDOR:trtc}
    trtc-sdk-app-id: ${APP_VIDEO_TRTC_SDK_APP_ID:1600147465}
    trtc-secret-key: ${APP_VIDEO_TRTC_SECRET_KEY:}
    trtc-user-sig-expire-seconds: ${APP_VIDEO_TRTC_USER_SIG_EXPIRE_SECONDS:604800}
  realtime:
    redis:
      enabled: ${APP_REALTIME_REDIS_ENABLED:false}
      channel: ${APP_REALTIME_REDIS_CHANNEL:gift-chat:realtime}
  tencent:
    chat:
      enabled: ${APP_TENCENT_CHAT_ENABLED:false}
      sdk-app-id: ${APP_TENCENT_CHAT_SDK_APP_ID:}
      secret-key: ${APP_TENCENT_CHAT_SECRET_KEY:}
      admin-identifier: ${APP_TENCENT_CHAT_ADMIN_IDENTIFIER:administrator}
      admin-user-sig: ${APP_TENCENT_CHAT_ADMIN_USER_SIG:}
      user-sig-expire-seconds: ${APP_TENCENT_CHAT_USER_SIG_EXPIRE_SECONDS:604800}
      rest-base-url: ${APP_TENCENT_CHAT_REST_BASE_URL:https://console.tim.qq.com}
