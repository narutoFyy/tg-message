services:
  mysql:
    image: mysql:8.4
    container_name: gift-chat-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: gift-chat-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../gift-chat-server
      dockerfile: Dockerfile
    container_name: gift-chat-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      APP_AUTH_JWT_SECRET: ${APP_AUTH_JWT_SECRET}
      APP_AUTH_ACCESS_TOKEN_MINUTES: ${APP_AUTH_ACCESS_TOKEN_MINUTES}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_UPLOAD_IMAGE_DIR: /var/lib/gift-chat/uploads/images
      APP_UPLOAD_VOICE_DIR: /var/lib/gift-chat/uploads/voices
      APP_UPLOAD_PUBLIC_BASE_URL: ${APP_UPLOAD_PUBLIC_BASE_URL}
      APP_REALTIME_REDIS_ENABLED: ${APP_REALTIME_REDIS_ENABLED:-true}
      APP_REALTIME_REDIS_CHANNEL: ${APP_REALTIME_REDIS_CHANNEL:-gift-chat:realtime}
      APP_TENCENT_CHAT_ENABLED: ${APP_TENCENT_CHAT_ENABLED:-false}
      APP_TENCENT_CHAT_SDK_APP_ID: ${APP_TENCENT_CHAT_SDK_APP_ID:-}
      APP_TENCENT_CHAT_SECRET_KEY: ${APP_TENCENT_CHAT_SECRET_KEY:-}
      APP_TENCENT_CHAT_ADMIN_IDENTIFIER: ${APP_TENCENT_CHAT_ADMIN_IDENTIFIER:-administrator}
      APP_TENCENT_CHAT_ADMIN_USER_SIG: ${APP_TENCENT_CHAT_ADMIN_USER_SIG:-}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    volumes:
      - upload-data:/var/lib/gift-chat/uploads
    expose:
      - "8081"

  frontend:
    build:
      context: ..
      dockerfile: gift-chat-uni/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_BASE_URL: /ws
    container_name: gift-chat-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"

volumes:
  mysql-data:
  redis-data:
  upload-data:
